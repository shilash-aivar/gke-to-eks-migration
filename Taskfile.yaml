version: "3"

vars:
  TF_AWS_DIR: infrastructure/terraform/aws
  TF_AZURE_DIR: infrastructure/terraform/azure
  ENV: '{{default "dev" .ENV}}'
  AWS_VARS: "../../../environments/aws/{{.ENV}}.tfvars"
  AZURE_VARS: "../../../environments/azure/{{.ENV}}.tfvars"
  HELM_DIR: helm
  DATA_GEN_DIR: data-generator
  VELERO_DIR: velero
  MANIFESTS_DIR: manifests
  AKS_CONTEXT:
    sh: kubectl config get-contexts -o name | grep -v "arn:aws:eks" | grep -v "^$" | head -1
  EKS_CONTEXT:
    sh: kubectl config get-contexts -o name | grep "arn:aws:eks" | head -1

env:
  AWS_DEFAULT_REGION: us-east-1

tasks:

  # ── Bootstrap ────────────────────────────────────────────────
  bootstrap:init:
    desc: "Init bootstrap (S3 state bucket)"
    dir: "{{.TF_AWS_DIR}}/bootstrap"
    cmds:
      - terraform init

  bootstrap:plan:
    desc: "Plan bootstrap"
    dir: "{{.TF_AWS_DIR}}/bootstrap"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AWS_VARS}}

  bootstrap:apply:
    desc: "Apply bootstrap"
    dir: "{{.TF_AWS_DIR}}/bootstrap"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  bootstrap:destroy:
    desc: "Destroy bootstrap"
    dir: "{{.TF_AWS_DIR}}/bootstrap"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  # ── Bootstrap IAM ────────────────────────────────────────────
  bootstrap-iam:init:
    desc: "Init bootstrap-iam (Velero IRSA)"
    dir: "{{.TF_AWS_DIR}}/bootstrap-iam"
    cmds:
      - terraform init -backend-config=backend/backend.hcl -reconfigure

  bootstrap-iam:plan:
    desc: "Plan bootstrap-iam"
    dir: "{{.TF_AWS_DIR}}/bootstrap-iam"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AWS_VARS}}

  bootstrap-iam:apply:
    desc: "Apply bootstrap-iam"
    dir: "{{.TF_AWS_DIR}}/bootstrap-iam"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  bootstrap-iam:destroy:
    desc: "Destroy bootstrap-iam"
    dir: "{{.TF_AWS_DIR}}/bootstrap-iam"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  # ── VPC ──────────────────────────────────────────────────────
  vpc:init:
    desc: "Init VPC module"
    dir: "{{.TF_AWS_DIR}}/vpc"
    cmds:
      - terraform init -backend-config=backend/backend.hcl -reconfigure

  vpc:plan:
    desc: "Plan VPC module"
    dir: "{{.TF_AWS_DIR}}/vpc"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AWS_VARS}}

  vpc:apply:
    desc: "Apply VPC module"
    dir: "{{.TF_AWS_DIR}}/vpc"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  vpc:destroy:
    desc: "Destroy VPC module"
    dir: "{{.TF_AWS_DIR}}/vpc"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  # ── EKS ──────────────────────────────────────────────────────
  eks:init:
    desc: "Init EKS module"
    dir: "{{.TF_AWS_DIR}}/eks"
    cmds:
      - terraform init -backend-config=backend/backend.hcl -reconfigure

  eks:plan:
    desc: "Plan EKS module"
    dir: "{{.TF_AWS_DIR}}/eks"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AWS_VARS}}

  eks:apply:
    desc: "Apply EKS module"
    dir: "{{.TF_AWS_DIR}}/eks"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  eks:destroy:
    desc: "Destroy EKS module"
    dir: "{{.TF_AWS_DIR}}/eks"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  # ── S3 ───────────────────────────────────────────────────────
  s3:init:
    desc: "Init S3 module"
    dir: "{{.TF_AWS_DIR}}/s3"
    cmds:
      - terraform init -backend-config=backend/backend.hcl -reconfigure

  s3:plan:
    desc: "Plan S3 module"
    dir: "{{.TF_AWS_DIR}}/s3"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AWS_VARS}}

  s3:apply:
    desc: "Apply S3 module"
    dir: "{{.TF_AWS_DIR}}/s3"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  s3:destroy:
    desc: "Destroy S3 module"
    dir: "{{.TF_AWS_DIR}}/s3"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  # ── Helm Velero (EKS) ────────────────────────────────────────
  helm-velero:init:
    desc: "Init Velero Helm module for EKS"
    dir: "{{.TF_AWS_DIR}}/helm-velero"
    cmds:
      - terraform init -backend-config=backend/backend.hcl -reconfigure

  helm-velero:plan:
    desc: "Plan Velero Helm release on EKS"
    dir: "{{.TF_AWS_DIR}}/helm-velero"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AWS_VARS}}

  helm-velero:apply:
    desc: "Apply Velero Helm release on EKS"
    dir: "{{.TF_AWS_DIR}}/helm-velero"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  helm-velero:destroy:
    desc: "Destroy Velero Helm release on EKS"
    dir: "{{.TF_AWS_DIR}}/helm-velero"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AWS_VARS}}

  # ── Full stack ───────────────────────────────────────────────
  aws:init-all:
    desc: "Init all AWS modules in order"
    cmds:
      - task: bootstrap:init
      - task: vpc:init
      - task: s3:init
      - task: eks:init
      - task: bootstrap-iam:init
      - task: helm-velero:init

  aws:apply-all:
    desc: "Apply all AWS modules in order"
    cmds:
      - task: bootstrap:apply
      - task: vpc:apply
      - task: s3:apply
      - task: eks:apply           # pass 1 — cluster + node group (EBS CSI addon skipped, no IRSA yet)
      - task: bootstrap-iam:apply # creates Velero + EBS CSI IRSA roles
      - task: eks:apply           # pass 2 — EBS CSI addon created now that IRSA role exists
      - task: helm-velero:apply

  aws:destroy-all:
    desc: "Destroy all AWS modules in reverse order"
    cmds:
      - task: helm-velero:destroy
      - task: bootstrap-iam:destroy
      - task: eks:destroy
      - task: s3:destroy
      - task: vpc:destroy
      - task: bootstrap:destroy

  # ── Azure Bootstrap ──────────────────────────────────────────
  az:bootstrap:init:
    desc: "Init Azure bootstrap (storage account for tfstate)"
    dir: "{{.TF_AZURE_DIR}}/bootstrap"
    cmds:
      - terraform init

  az:bootstrap:plan:
    desc: "Plan Azure bootstrap"
    dir: "{{.TF_AZURE_DIR}}/bootstrap"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AZURE_VARS}}

  az:bootstrap:apply:
    desc: "Apply Azure bootstrap"
    dir: "{{.TF_AZURE_DIR}}/bootstrap"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  az:bootstrap:destroy:
    desc: "Destroy Azure bootstrap"
    dir: "{{.TF_AZURE_DIR}}/bootstrap"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  # ── Azure Bootstrap IAM ──────────────────────────────────────
  az:bootstrap-iam:init:
    desc: "Init Azure bootstrap-iam (Velero workload identity)"
    dir: "{{.TF_AZURE_DIR}}/bootstrap-iam"
    cmds:
      - terraform init -backend-config=backend/backend.hcl -reconfigure

  az:bootstrap-iam:plan:
    desc: "Plan Azure bootstrap-iam"
    dir: "{{.TF_AZURE_DIR}}/bootstrap-iam"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AZURE_VARS}}

  az:bootstrap-iam:apply:
    desc: "Apply Azure bootstrap-iam"
    dir: "{{.TF_AZURE_DIR}}/bootstrap-iam"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  az:bootstrap-iam:destroy:
    desc: "Destroy Azure bootstrap-iam"
    dir: "{{.TF_AZURE_DIR}}/bootstrap-iam"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  # ── Azure VNet ───────────────────────────────────────────────
  az:vnet:init:
    desc: "Init Azure VNet module"
    dir: "{{.TF_AZURE_DIR}}/vnet"
    cmds:
      - terraform init -backend-config=backend/backend.hcl -reconfigure

  az:vnet:plan:
    desc: "Plan Azure VNet module"
    dir: "{{.TF_AZURE_DIR}}/vnet"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AZURE_VARS}}

  az:vnet:apply:
    desc: "Apply Azure VNet module"
    dir: "{{.TF_AZURE_DIR}}/vnet"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  az:vnet:destroy:
    desc: "Destroy Azure VNet module"
    dir: "{{.TF_AZURE_DIR}}/vnet"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  # ── Azure AKS ────────────────────────────────────────────────
  az:aks:init:
    desc: "Init Azure AKS module"
    dir: "{{.TF_AZURE_DIR}}/aks"
    cmds:
      - terraform init -backend-config=backend/backend.hcl -reconfigure

  az:aks:plan:
    desc: "Plan Azure AKS module"
    dir: "{{.TF_AZURE_DIR}}/aks"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AZURE_VARS}}

  az:aks:apply:
    desc: "Apply Azure AKS module"
    dir: "{{.TF_AZURE_DIR}}/aks"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  az:aks:destroy:
    desc: "Destroy Azure AKS module"
    dir: "{{.TF_AZURE_DIR}}/aks"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  # ── Azure Storage ────────────────────────────────────────────
  az:storage:init:
    desc: "Init Azure storage module"
    dir: "{{.TF_AZURE_DIR}}/storage"
    cmds:
      - terraform init -backend-config=backend/backend.hcl -reconfigure

  az:storage:plan:
    desc: "Plan Azure storage module"
    dir: "{{.TF_AZURE_DIR}}/storage"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AZURE_VARS}}

  az:storage:apply:
    desc: "Apply Azure storage module"
    dir: "{{.TF_AZURE_DIR}}/storage"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  az:storage:destroy:
    desc: "Destroy Azure storage module"
    dir: "{{.TF_AZURE_DIR}}/storage"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  # ── Helm Velero (AKS) ────────────────────────────────────────
  az:helm-velero:init:
    desc: "Init Velero Helm module for AKS"
    dir: "{{.TF_AZURE_DIR}}/helm-velero"
    cmds:
      - terraform init -backend-config=backend/backend.hcl -reconfigure

  az:helm-velero:plan:
    desc: "Plan Velero Helm release on AKS"
    dir: "{{.TF_AZURE_DIR}}/helm-velero"
    cmds:
      - terraform plan -compact-warnings -var-file={{.AZURE_VARS}}

  az:helm-velero:apply:
    desc: "Apply Velero Helm release on AKS"
    dir: "{{.TF_AZURE_DIR}}/helm-velero"
    cmds:
      - terraform apply -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  az:helm-velero:destroy:
    desc: "Destroy Velero Helm release on AKS"
    dir: "{{.TF_AZURE_DIR}}/helm-velero"
    cmds:
      - terraform destroy -compact-warnings -auto-approve -var-file={{.AZURE_VARS}}

  # ── Azure full stack ─────────────────────────────────────────
  az:init-all:
    desc: "Init all Azure modules in order"
    cmds:
      - task: az:bootstrap:init
      - task: az:vnet:init
      - task: az:storage:init
      - task: az:aks:init
      - task: az:bootstrap-iam:init
      - task: az:helm-velero:init

  az:apply-all:
    desc: "Apply all Azure modules in order"
    cmds:
      - task: az:bootstrap:apply
      - task: az:vnet:apply
      - task: az:storage:apply
      - task: az:aks:apply
      - task: az:bootstrap-iam:apply
      - task: az:helm-velero:apply

  az:destroy-all:
    desc: "Destroy all Azure modules in reverse order"
    cmds:
      - task: az:helm-velero:destroy
      - task: az:bootstrap-iam:destroy
      - task: az:aks:destroy
      - task: az:storage:destroy
      - task: az:vnet:destroy
      - task: az:bootstrap:destroy

  # ── Helm ─────────────────────────────────────────────────────
  helm:velero:install:
    desc: "Install Velero on EKS"
    cmds:
      - >
        envsubst < {{.HELM_DIR}}/velero/values-eks.yaml |
        helm upgrade --install velero vmware-tanzu/velero
        --namespace velero --create-namespace
        --kube-context {{.EKS_CONTEXT}} -f -

  helm:velero:install-aks:
    desc: "Install Velero on AKS"
    cmds:
      - >
        helm upgrade --install velero vmware-tanzu/velero
        --namespace velero --create-namespace
        --kube-context {{.AKS_CONTEXT}}
        -f {{.HELM_DIR}}/velero/values-aks.yaml

  helm:velero:uninstall:
    desc: "Uninstall Velero"
    cmds:
      - helm uninstall velero --namespace velero --kube-context {{.AKS_CONTEXT}}

  helm:loki:install:
    desc: "Install Loki (generic)"
    cmds:
      - >
        helm upgrade --install loki grafana/loki-stack
        --namespace monitoring --create-namespace
        -f {{.HELM_DIR}}/loki/values.yaml

  helm:loki:install-eks:
    desc: "Install Loki on EKS"
    cmds:
      - >
        helm upgrade --install loki grafana/loki-stack
        --namespace monitoring --create-namespace
        -f {{.HELM_DIR}}/loki/values-eks.yaml

  helm:loki:install-aks:
    desc: "Install Loki on AKS"
    cmds:
      - >
        helm upgrade --install loki grafana/loki-stack
        --namespace monitoring --create-namespace
        -f {{.HELM_DIR}}/loki/values-aks.yaml

  helm:grafana:install:
    desc: "Install Grafana"
    cmds:
      - >
        helm upgrade --install grafana grafana/grafana
        --namespace monitoring --create-namespace
        -f {{.HELM_DIR}}/grafana/values.yaml

  helm:promtail:install:
    desc: "Install Promtail"
    cmds:
      - >
        helm upgrade --install promtail grafana/promtail
        --namespace monitoring --create-namespace
        -f {{.HELM_DIR}}/promtail/values.yaml

  helm:monitoring:install:
    desc: "Install full monitoring stack (Loki + Grafana + Promtail)"
    cmds:
      - task: helm:loki:install
      - task: helm:grafana:install
      - task: helm:promtail:install

  # ── Velero manifests ─────────────────────────────────────────
  velero:backup:
    desc: "Trigger Velero backup (databases only)"
    cmds:
      - kubectl apply -f {{.VELERO_DIR}}/backup.yaml --context {{.AKS_CONTEXT}}

  velero:backup-all:
    desc: "Trigger full migration backup"
    cmds:
      - kubectl apply -f {{.VELERO_DIR}}/backup-all.yaml --context {{.AKS_CONTEXT}}

  velero:restore:
    desc: "Trigger Velero restore"
    cmds:
      - kubectl apply -f {{.VELERO_DIR}}/restore.yaml --context {{.EKS_CONTEXT}}

  velero:status:
    desc: "Check Velero backup and restore status"
    cmds:
      - echo "=== Backups (AKS) ===" && kubectl get backups -n velero --context {{.AKS_CONTEXT}} -o custom-columns="NAME:.metadata.name,STATUS:.status.phase,STARTED:.status.startTimestamp,COMPLETED:.status.completionTimestamp,ERRORS:.status.errors,WARNINGS:.status.warnings"
      - echo "=== Restores (EKS) ===" && kubectl get restores -n velero --context {{.EKS_CONTEXT}} -o custom-columns="NAME:.metadata.name,STATUS:.status.phase,STARTED:.metadata.creationTimestamp,ERRORS:.status.errors,WARNINGS:.status.warnings"
      - echo "=== Storage Locations ===" && kubectl get backupstoragelocations -n velero --context {{.AKS_CONTEXT}}

  # ── Data generator ───────────────────────────────────────────
  data:setup:
    desc: "Sync data generator dependencies with uv"
    dir: "{{.DATA_GEN_DIR}}"
    cmds:
      - uv sync

  data:generate:mysql:
    desc: "Generate fake data into MySQL. Flags: CUSTOMERS=N ORDERS_MIN=N ORDERS_MAX=N BATCH_SIZE=N"
    dir: "{{.DATA_GEN_DIR}}"
    vars:
      CUSTOMERS: '{{default "100" .CUSTOMERS}}'
      ORDERS_MIN: '{{default "1" .ORDERS_MIN}}'
      ORDERS_MAX: '{{default "5" .ORDERS_MAX}}'
      BATCH_SIZE: '{{default "1000" .BATCH_SIZE}}'
    cmds:
      - |
        pkill -f "port-forward svc/mysql" 2>/dev/null; sleep 1
        kubectl port-forward svc/mysql 3306:3306 -n databases --context {{.AKS_CONTEXT}} &
        PF_PID=$!
        trap "kill $PF_PID 2>/dev/null" EXIT
        until nc -z 127.0.0.1 3306 2>/dev/null; do sleep 1; done
        uv run generate.py --db mysql \
          --host 127.0.0.1 --port 3306 \
          --user appuser --password apppassword --database appdb \
          --customers {{.CUSTOMERS}} --orders-min {{.ORDERS_MIN}} --orders-max {{.ORDERS_MAX}} \
          --batch-size {{.BATCH_SIZE}}

  data:generate:postgres:
    desc: "Generate fake data into Postgres. Flags: CUSTOMERS=N ORDERS_MIN=N ORDERS_MAX=N BATCH_SIZE=N"
    dir: "{{.DATA_GEN_DIR}}"
    vars:
      CUSTOMERS: '{{default "100" .CUSTOMERS}}'
      ORDERS_MIN: '{{default "1" .ORDERS_MIN}}'
      ORDERS_MAX: '{{default "5" .ORDERS_MAX}}'
      BATCH_SIZE: '{{default "1000" .BATCH_SIZE}}'
    cmds:
      - |
        pkill -f "port-forward svc/postgres" 2>/dev/null; sleep 1
        kubectl port-forward svc/postgres 5432:5432 -n databases --context {{.AKS_CONTEXT}} &
        PF_PID=$!
        trap "kill $PF_PID 2>/dev/null" EXIT
        until nc -z 127.0.0.1 5432 2>/dev/null; do sleep 1; done
        uv run generate.py --db postgres \
          --host 127.0.0.1 --port 5432 \
          --user appuser --password apppassword --database appdb \
          --customers {{.CUSTOMERS}} --orders-min {{.ORDERS_MIN}} --orders-max {{.ORDERS_MAX}} \
          --batch-size {{.BATCH_SIZE}}

  data:generate:all:
    desc: "Generate fake data into both MySQL and Postgres"
    cmds:
      - task: data:generate:mysql
      - task: data:generate:postgres

  data:count:aks:
    desc: "Count rows in customers and orders on AKS"
    dir: "{{.DATA_GEN_DIR}}"
    cmds:
      - |
        pkill -f "port-forward svc/mysql" 2>/dev/null; sleep 1
        pkill -f "port-forward svc/postgres" 2>/dev/null; sleep 1
        kubectl port-forward svc/mysql 3306:3306 -n databases --context {{.AKS_CONTEXT}} &
        PF_MYSQL=$!
        kubectl port-forward svc/postgres 5432:5432 -n databases --context {{.AKS_CONTEXT}} &
        PF_PG=$!
        trap "kill $PF_MYSQL $PF_PG 2>/dev/null" EXIT
        until nc -z 127.0.0.1 3306 2>/dev/null; do sleep 1; done
        until nc -z 127.0.0.1 5432 2>/dev/null; do sleep 1; done
        uv run count.py

  data:count:eks:
    desc: "Count rows in customers and orders on EKS"
    dir: "{{.DATA_GEN_DIR}}"
    cmds:
      - |
        pkill -f "port-forward svc/mysql" 2>/dev/null; sleep 1
        pkill -f "port-forward svc/postgres" 2>/dev/null; sleep 1
        kubectl port-forward svc/mysql 3306:3306 -n databases --context {{.EKS_CONTEXT}} &
        PF_MYSQL=$!
        kubectl port-forward svc/postgres 5432:5432 -n databases --context {{.EKS_CONTEXT}} &
        PF_PG=$!
        trap "kill $PF_MYSQL $PF_PG 2>/dev/null" EXIT
        until nc -z 127.0.0.1 3306 2>/dev/null; do sleep 1; done
        until nc -z 127.0.0.1 5432 2>/dev/null; do sleep 1; done
        uv run count.py

  data:count:all:
    desc: "Count rows on both AKS and EKS for comparison"
    dir: "{{.DATA_GEN_DIR}}"
    cmds:
      - |
        pkill -f "port-forward svc/mysql" 2>/dev/null
        pkill -f "port-forward svc/postgres" 2>/dev/null
        sleep 1

        echo "=== AKS ==="
        kubectl port-forward svc/mysql 3306:3306 -n databases --context {{.AKS_CONTEXT}} &>/dev/null &
        PF_MYSQL=$!
        kubectl port-forward svc/postgres 5432:5432 -n databases --context {{.AKS_CONTEXT}} &>/dev/null &
        PF_PG=$!
        until nc -z 127.0.0.1 3306 2>/dev/null; do sleep 1; done
        until nc -z 127.0.0.1 5432 2>/dev/null; do sleep 1; done
        uv run count.py
        kill $PF_MYSQL $PF_PG 2>/dev/null || true
        sleep 2

        echo ""
        echo "=== EKS ==="
        kubectl port-forward svc/mysql 3306:3306 -n databases --context {{.EKS_CONTEXT}} &>/dev/null &
        PF_MYSQL=$!
        kubectl port-forward svc/postgres 5432:5432 -n databases --context {{.EKS_CONTEXT}} &>/dev/null &
        PF_PG=$!
        until nc -z 127.0.0.1 3306 2>/dev/null; do sleep 1; done
        until nc -z 127.0.0.1 5432 2>/dev/null; do sleep 1; done
        uv run count.py
        kill $PF_MYSQL $PF_PG 2>/dev/null || true

  data:count:
    desc: "Alias for data:count:all"
    cmds:
      - task: data:count:all

  data:verify:
    desc: "Verify data parity between AKS (source) and EKS (destination)"
    dir: "{{.DATA_GEN_DIR}}"
    cmds:
      - |
        pkill -f "port-forward svc/mysql" 2>/dev/null || true
        pkill -f "port-forward svc/postgres" 2>/dev/null || true
        sleep 1
        kubectl port-forward svc/mysql    3307:3306 -n databases --context {{.AKS_CONTEXT}} &>/dev/null &
        kubectl port-forward svc/mysql    3308:3306 -n databases --context {{.EKS_CONTEXT}} &>/dev/null &
        kubectl port-forward svc/postgres 5433:5432 -n databases --context {{.AKS_CONTEXT}} &>/dev/null &
        kubectl port-forward svc/postgres 5434:5432 -n databases --context {{.EKS_CONTEXT}} &>/dev/null &
        trap "pkill -f 'port-forward svc/mysql' 2>/dev/null; pkill -f 'port-forward svc/postgres' 2>/dev/null" EXIT
        until nc -z 127.0.0.1 3307 2>/dev/null; do sleep 1; done
        until nc -z 127.0.0.1 3308 2>/dev/null; do sleep 1; done
        until nc -z 127.0.0.1 5433 2>/dev/null; do sleep 1; done
        until nc -z 127.0.0.1 5434 2>/dev/null; do sleep 1; done
        uv run verify.py

  # ── Manifests ────────────────────────────────────────────────
  manifests:deploy:eks:
    desc: "Deploy database workloads on EKS"
    cmds:
      - kubectl apply -f {{.MANIFESTS_DIR}}/databases-eks.yaml --context {{.EKS_CONTEXT}}

  manifests:deploy:aks:
    desc: "Deploy database workloads on AKS"
    cmds:
      - kubectl apply -f {{.MANIFESTS_DIR}}/databases-aks.yaml --context {{.AKS_CONTEXT}}

  manifests:delete:eks:
    desc: "Delete database workloads from EKS"
    cmds:
      - kubectl delete -f {{.MANIFESTS_DIR}}/databases-eks.yaml --context {{.EKS_CONTEXT}}

  manifests:delete:aks:
    desc: "Delete database workloads from AKS"
    cmds:
      - kubectl delete -f {{.MANIFESTS_DIR}}/databases-aks.yaml --context {{.AKS_CONTEXT}}

  manifests:status:
    desc: "Check database workload pod status on both clusters"
    cmds:
      - echo "=== AKS ===" && kubectl get pods -n databases --context {{.AKS_CONTEXT}} && kubectl get pvc -n databases --context {{.AKS_CONTEXT}}
      - echo "=== EKS ===" && kubectl get pods -n databases --context {{.EKS_CONTEXT}} && kubectl get pvc -n databases --context {{.EKS_CONTEXT}}
