# New PVCs / Velero restores — encrypted gp2 (org SCP). Do not redefine cluster "gp2" here (immutable).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp2-encrypted
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp2
  encrypted: "true"
  # kmsKeyId: <org-approved CMK ARN; omit for default EBS encryption key>
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
