image:
  repository: velero/velero
  tag: v1.18.0
  pullPolicy: IfNotPresent

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.11.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: migration-bucket-for-aivar-shilash        # ← same bucket as GKE
      default: true
      config:
        region: us-east-1

  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: us-east-1

  defaultVolumesToFsBackup: true
  uploaderType: kopia

credentials:
  useSecret: true
  name: velero-credentials
  secretContents:
    cloud: |
      [default]
      aws_access_key_id=REPLACE_ME
      aws_secret_access_key=REPLACE_ME

deployNodeAgent: true

nodeAgent:
  podVolumePath: /var/lib/kubelet/pods
  privileged: false
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

resources:
  requests:
    cpu: 500m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 256Mi

# Map source cluster storage class → EKS storage class (GKE and/or AKS)
configMaps:
  change-storage-class:
    labels:
      velero.io/plugin-config: ""
      velero.io/change-storage-class: RestoreItemAction
    data:
      # GKE
      standard: gp2
      standard-rwo: gp2
      premium-rwo: gp3
      # AKS (Disk CSI — default on modern AKS)
      managed-csi: gp2
      managed: gp2
      default: gp2
      managed-csi-premium: gp3
      managed-premium: gp3

metrics:
  enabled: true
  scrapeInterval: 30s
