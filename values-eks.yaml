image:
  repository: velero/velero
  tag: v1.18.0
  pullPolicy: IfNotPresent

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.11.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: migration-bucket-aks-eks-velero-poc
      default: true
      config:
        region: us-east-1

  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: us-east-1

  defaultVolumesToFsBackup: true
  uploaderType: kopia

# Create secret before helm install (never commit keys):
#   kubectl -n velero create secret generic velero-credentials \
#     --from-file=cloud=aws-credentials
# Or: AWS_CREDS_FILE=./aws-credentials ./scripts/setup-eks-poc.sh
credentials:
  useSecret: true
  name: velero-credentials
  secretContents:
    cloud: |
      [default]
      aws_access_key_id=REPLACE_ME
      aws_secret_access_key=REPLACE_ME

deployNodeAgent: true

nodeAgent:
  podVolumePath: /var/lib/kubelet/pods
  privileged: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Map AKS storage classes → EKS (gp2-encrypted for org SCP)
configMaps:
  change-storage-class:
    labels:
      velero.io/plugin-config: ""
      velero.io/change-storage-class: RestoreItemAction
    data:
      managed-csi: gp2-encrypted
      managed: gp2-encrypted
      default: gp2-encrypted
      gp2: gp2-encrypted
      managed-csi-premium: gp3
      managed-premium: gp3

metrics:
  enabled: false
