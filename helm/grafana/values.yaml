# Grafana UI for Loki — POC credentials only
adminUser: admin
adminPassword: poc-admin-change-me

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local
        isDefault: true
        jsonData:
          maxLines: 1000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
